<form [formGroup]="reportForm" style="max-width: 400px">

  <div class="header">
    <h2 mat-dialog-title>Signaler</h2>
    <button mat-icon-button [mat-dialog-close]="false">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <mat-dialog-content>
    <p class="report-target">Vous signalez : <strong>{{ data.label }}</strong></p>

    @if (data.details && data.details.length) {
      <div class="report-details">
        @for (detail of data.details; track detail.label) {
          <div class="report-details__row">
            <span class="report-details__label">{{ detail.label }}</span>
            <span class="report-details__value">{{ detail.value }}</span>
          </div>
        }
      </div>
    }

    <mat-form-field appearance="outline" style="width: 100%">
      <mat-label>Décrivez le problème</mat-label>
      <textarea matInput rows="4" formControlName="description" placeholder="Expliquez ce qui ne va pas..."></textarea>
    </mat-form-field>

    @if (errorMessage()) {
      <p class="control-error">{{ errorMessage() }}</p>
    }
  </mat-dialog-content>

  <mat-dialog-actions>
    <button matButton (click)="onClose()">Annuler</button>
    <button matButton (click)="onSubmit()">Envoyer</button>
  </mat-dialog-actions>

</form>
