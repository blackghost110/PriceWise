<app-header/>

<main class="main-content">
  <div class="content-container">
    <div class="main-section">
      <div class="section-header">
        <h2>Liste des utilisateurs</h2>


      </div>
      @if (userList() !== null) {
        <table mat-table [dataSource]="userList()!" class="product-table">
          <ng-container matColumnDef="displayName" >
            <th mat-header-cell *matHeaderCellDef> Nom </th>
            <td mat-cell *matCellDef="let user" class="table-name">{{user.displayName}}</td>
          </ng-container>

          <ng-container matColumnDef="role">
            <th mat-header-cell *matHeaderCellDef>Admin role </th>
            <td mat-cell *matCellDef="let user" [ngStyle]="{ color: user.role === 'ADMIN' ? 'red' : 'blue' }">{{ user.role }}
            </td>
          </ng-container>

          <ng-container matColumnDef="actions" >
            <th mat-header-cell *matHeaderCellDef> </th>
            <td mat-cell *matCellDef="let user" class="table-action" (click)="$event.stopPropagation()">
              <button matIconButton [matMenuTriggerFor]="userMenu">
                <mat-icon>settings</mat-icon>
              </button>
              <mat-menu #userMenu="matMenu">
                <button mat-menu-item (click)="onOpenDialogUpdateRole(user)">
                  <mat-icon>square_edit</mat-icon>
                  Modifier rôle
                </button>
              </mat-menu>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;" [routerLink]="AppRoutes.productDetailPage(row.productId)"></tr>

        </table>

      }




    </div>
  </div>

</main>


<app-footer/>
