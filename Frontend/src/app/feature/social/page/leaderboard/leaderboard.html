
<app-header/>

<nav class="nav-bar">
  <div class="nav-container">
    <div class="nav-items">
      <button [routerLink]="AppRoutes.DASHBOARD_PAGE" routerLinkActive="active" class="nav-item">
        <mat-icon>forum</mat-icon>
        <span>Forum</span>
      </button>
      <button [routerLink]="AppRoutes.LEADERBOARD_PAGE" routerLinkActive="active" class="nav-item">
        <mat-icon>leaderboard</mat-icon>
        <span>Classement</span>
      </button>
    </div>
  </div>
</nav>

<main class="main-content">
  <div class="content-container">
    <div class="main-section">
      <div class="section-header">
        <h2>Liste des utilisateurs</h2>


      </div>
      @if (userList() !== null) {
        <table mat-table [dataSource]="userList()!" class="product-table">
          <ng-container matColumnDef="username" >
            <th mat-header-cell *matHeaderCellDef> Nom </th>
            <td mat-cell *matCellDef="let user" class="table-name">{{user.username}}</td>
          </ng-container>

          <ng-container matColumnDef="score">
            <th mat-header-cell *matHeaderCellDef>Score </th>
            <td mat-cell *matCellDef="let user">{{ user.pricecount }}
            </td>
          </ng-container>



          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

        </table>

      }




    </div>
  </div>

</main>


<app-footer/>
