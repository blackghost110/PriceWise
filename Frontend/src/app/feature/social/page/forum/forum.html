<app-header/>


<main class="main-content">
  <div class="content-container">
    <div class="main-section">
      <div class="section-header">
        <h2>Liste des discussion</h2>
        <!--        <p>Selection de magasin disponible : 20</p>-->

        <mat-form-field appearance="outline" class="white-background" >
          <mat-label>Rechercher une discussion</mat-label>
          <input matInput
                 placeholder="Sujet ou Code Postal..."
                 [value]="searchTerm()"
                 (input)="onSearchChange($event.target!.value)" >
          @if (searchTerm()) {
            <mat-icon class="icon-hover" matIconSuffix (click)="onClearSearch()">close</mat-icon>
          } @else {
            <mat-icon matIconSuffix>search</mat-icon>
          }
        </mat-form-field>
        <button matButton="elevated" (click)="onOpenDialogAddPost()" style="float: right">Créer une discussion</button>
      </div>

      <table mat-table [dataSource]="dataSource" class="product-table">
        <ng-container matColumnDef="title" >
          <th mat-header-cell *matHeaderCellDef> Sujet </th>
          <td mat-cell *matCellDef="let post" [routerLink]="AppRoutes.postPage(post.postId)" style="cursor: pointer"> {{post.title}} </td>
        </ng-container>

        <ng-container matColumnDef="postalCode">
          <th mat-header-cell *matHeaderCellDef> Code Postal </th>
          <td mat-cell *matCellDef="let post"> {{post.postalCode}} </td>
        </ng-container>

        <ng-container matColumnDef="commentCount">
          <th mat-header-cell *matHeaderCellDef> Com. </th>
          <td mat-cell *matCellDef="let post"> {{post.commentCount}} </td>
        </ng-container>

        <ng-container matColumnDef="user">
          <th mat-header-cell *matHeaderCellDef> Auteur </th>
          <td mat-cell *matCellDef="let post"> {{post.user.username}} </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

      </table>
      <mat-paginator [pageSizeOptions]="[10, 20]"
                     showFirstLastButtons
                     aria-label="Select page of periodic elements">
      </mat-paginator>

    </div>
  </div>

</main>


<app-footer/>
